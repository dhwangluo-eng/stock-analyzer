name: Build Executables

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas requests
        pip install git+https://github.com/openclaw/stock-cli.git || echo "stock-cli install skipped"
    
    - name: Build Windows executable
      run: |
        pyinstaller --onefile --windowed --name stock-analyzer-win stock_analyzer_gui.py || pyinstaller --onefile --name stock-analyzer-win stock_analyzer_gui.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: windows-exe
        path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas requests
    
    - name: Build macOS executable
      run: |
        pyinstaller --onefile --windowed --name stock-analyzer-mac stock_analyzer_gui.py || pyinstaller --onefile --name stock-analyzer-mac stock_analyzer_gui.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: macos-app
        path: dist/stock-analyzer-mac

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v3
    
    - name: List files
      run: ls -R
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          windows-exe/*.exe
          macos-app/stock-analyzer-mac
        draft: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}