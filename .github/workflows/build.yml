name: Build Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install PyInstaller
      run: pip install pyinstaller
    
    - name: Build Windows executable
      run: pyinstaller --onefile --windowed --name stock-analyzer-win stock_analyzer_standalone.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: windows-exe
        path: dist/stock-analyzer-win.exe

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install PyInstaller
      run: pip install pyinstaller
    
    - name: Build macOS executable
      run: pyinstaller --onefile --windowed --name stock-analyzer-mac stock_analyzer_standalone.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: macos-app
        path: dist/stock-analyzer-mac

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v3
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          windows-exe/stock-analyzer-win.exe
          macos-app/stock-analyzer-mac
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}