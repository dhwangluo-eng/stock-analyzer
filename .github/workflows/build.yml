name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PyInstaller
      run: pip install pyinstaller
    
    - name: Build Windows executable
      run: pyinstaller --onefile --windowed --name stock-analyzer-win stock_analyzer_standalone.py
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/stock-analyzer-win.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PyInstaller
      run: pip install pyinstaller
    
    - name: Build macOS executable
      run: pyinstaller --onefile --windowed --name stock-analyzer-mac stock_analyzer_standalone.py
    
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/stock-analyzer-mac
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}